<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дом на CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            font-family: Arial, sans-serif;
        }

        /* Контейнер дома */
        .house-container {
            position: relative;
            width: 400px;
            height: 500px;
        }

        /* Основание дома */
        .house-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 250px;
            background: linear-gradient(to bottom, #F5DEB3, #DEB887);
            border: 3px solid #8B4513;
            border-radius: 5px;
        }

        /* Крыша */
        .roof {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-bottom: 150px solid #8B0000;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }

        /* Дымоход */
        .chimney {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(30%);
            width: 50px;
            height: 100px;
            background: linear-gradient(to right, #8B4513, #A0522D);
            border: 2px solid #5D2906;
            z-index: 1;
        }

        /* Дым из дымохода */
        .smoke {
            position: absolute;
            top: 50px;
            left: 55%;
            transform: translateX(30%);
            width: 20px;
            height: 20px;
            background: #D3D3D3;
            border-radius: 50%;
            animation: smokeRise 2s infinite;
            opacity: 0.7;
        }

        .smoke:nth-child(2) {
            animation-delay: 0.5s;
            left: 45%;
        }

        .smoke:nth-child(3) {
            animation-delay: 1s;
            left: 55%;
        }

        @keyframes smokeRise {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-60px) scale(2);
                opacity: 0;
            }
        }

        /* Окно */
        .window {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(to bottom, #87CEEB, #B0E0E6);
            border: 5px solid #8B4513;
            border-radius: 50%;
            overflow: hidden;
        }

        /* Наличник для окна */
        .window-frame {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            border: 3px solid #A0522D;
            border-radius: 50%;
        }

        /* Перекладины окна */
        .window::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: #8B4513;
            transform: translateY(-50%);
        }

        .window::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 3px;
            height: 100%;
            background: #8B4513;
            transform: translateX(-50%);
        }

        /* Дверь */
        .door {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 100px;
            background: linear-gradient(to right, #8B4513, #A0522D);
            border: 3px solid #5D2906;
            border-radius: 5px 5px 0 0;
        }

        /* Ручка двери */
        .door-knob {
            position: absolute;
            top: 50%;
            right: 10px;
            width: 12px;
            height: 12px;
            background: #FFD700;
            border-radius: 50%;
            border: 2px solid #DAA520;
        }

        /* Дверная коробка */
        .door-frame {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 105px;
            border: 4px solid #5D2906;
            border-radius: 8px 8px 0 0;
            border-bottom: none;
        }

        /* Трава/земля */
        .ground {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 50px;
            background: linear-gradient(to bottom, #228B22, #006400);
            border-radius: 50% 50% 0 0;
        }

        /* Солнце */
        .sun {
            position: absolute;
            top: 30px;
            right: 50px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            box-shadow: 0 0 30px #FFD700;
            animation: sunGlow 3s infinite alternate;
        }

        @keyframes sunGlow {
            0% {
                box-shadow: 0 0 30px #FFD700;
            }
            100% {
                box-shadow: 0 0 50px #FFA500;
            }
        }

        /* Заголовок */
        h1 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h1>Мой Дом на CSS</h1>
    
    <div class="house-container">
        <!-- Солнце -->
        <div class="sun"></div>
        
        <!-- Крыша -->
        <div class="roof"></div>
        
        <!-- Дымоход -->
        <div class="chimney"></div>
        
        <!-- Дым -->
        <div class="smoke"></div>
        <div class="smoke"></div>
        <div class="smoke"></div>
        
        <!-- Основание дома -->
        <div class="house-base">
		
            <!-- Окно -->
            <div class="window-frame"></div>
            <div class="window"></div>
            
            <!-- Дверь -->
            <div class="door-frame"></div>
            <div class="door">
                <div class="door-knob"></div>
            </div>
        </div>
        
        <!-- Земля -->
        <div class="ground"></div>
    </div>
</body>
</html>
